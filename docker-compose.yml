version: '3.8'

services:
  worldmonitor:
    build: .
    container_name: worldmonitor-core
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=sqlite:/app/data/worldmonitor.db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MAX_ALERTS_FREE=3
      - RUST_LOG=info
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/intelligence"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add a reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: worldmonitor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - worldmonitor
    restart: unless-stopped
    profiles:
      - production
