<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Real-time global intelligence monitoring - 10x faster, 29x lighter">
    <meta name="theme-color" content="#0a0a0f">
    <title>WorldMonitor Core - Real-Time Intelligence</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <script type="importmap">
    {
        "imports": {
            "preact": "https://esm.sh/preact@10.19.3",
            "preact/hooks": "https://esm.sh/preact@10.19.3/hooks",
            "htm/preact": "https://esm.sh/htm@3.1.1/preact?external=preact"
        }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #0f172a;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-blue-light: #60a5fa;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --accent-green: #10b981;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
        }
        
        .app { 
            max-width: 100vw; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* Upgrade Banner */
        .upgrade-banner {
            background: linear-gradient(135deg, var(--accent-orange) 0%, #d97706 100%);
            color: white;
            padding: 0.75rem;
            text-align: center;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .upgrade-banner:hover { opacity: 0.95; }
        .upgrade-banner a { color: white; text-decoration: underline; margin-left: 0.5rem; }
        
        /* Header */
        header {
            background: linear-gradient(135deg, #1e3a5f 0%, var(--bg-secondary) 100%);
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        h1 { 
            font-size: 1.25rem; 
            font-weight: 700; 
            color: var(--accent-blue-light); 
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .streak {
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent-orange);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        /* Navigation */
        .nav {
            display: flex;
            gap: 0.5rem;
            background: var(--bg-card);
            padding: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .nav button {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            font-size: 0.875rem;
        }
        
        .nav button:hover { background: rgba(59, 130, 246, 0.1); }
        .nav button.active {
            background: var(--accent-blue);
            color: white;
        }
        
        /* Content Area */
        .content { flex: 1; overflow-y: auto; }
        
        /* Onboarding */
        .onboarding {
            padding: 2rem 1rem;
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .onboarding h2 {
            font-size: 1.75rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
            line-height: 1.3;
        }
        
        .onboarding p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
            font-size: 1rem;
        }
        
        .onboarding .features {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2rem;
            text-align: left;
        }
        
        .onboarding .feature {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: var(--bg-card);
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
        }
        
        .onboarding .feature-icon {
            font-size: 1.25rem;
        }
        
        .onboarding .feature-text {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-bottom: 0.75rem;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:hover { background: #2563eb; }
        .btn:active { transform: scale(0.98); }
        
        .btn.secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn.secondary:hover { background: #2d3748; }
        
        .btn.selected {
            background: var(--accent-green);
            border-color: var(--accent-green);
        }
        
        .interest-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        
        .interest-grid .btn {
            margin-bottom: 0;
            padding: 1rem 0.5rem;
            font-size: 0.875rem;
        }
        
        /* Map */
        .heatmap {
            position: relative;
            width: 100%;
            height: 60vh;
            background: var(--bg-secondary);
            cursor: crosshair;
        }
        
        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
        }
        
        /* Tooltip/Popup */
        .country-popup {
            position: absolute;
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1rem;
            min-width: 220px;
            max-width: 300px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            z-index: 50;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        
        .country-popup h4 {
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }
        
        .country-popup p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 0.5rem;
        }
        
        .country-popup .severity {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
        }
        
        .country-popup .severity.high {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
        }
        
        .country-popup .severity.medium {
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent-orange);
        }
        
        .country-popup .severity.low {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
        }
        
        /* Brief View */
        .brief {
            padding: 1rem;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--accent-blue);
        }
        
        .card h3 {
            color: var(--accent-blue-light);
            margin-bottom: 0.75rem;
            font-size: 1.125rem;
        }
        
        .card p {
            color: #cbd5e1;
            line-height: 1.7;
            white-space: pre-line;
        }
        
        .card .meta {
            margin-top: 1rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .card.severity-high { border-left-color: var(--accent-red); }
        .card.severity-high h3 { color: var(--accent-red); }
        
        .card.severity-med { border-left-color: var(--accent-orange); }
        .card.severity-med h3 { color: var(--accent-orange); }
        
        .card.severity-low { border-left-color: var(--accent-green); }
        .card.severity-low h3 { color: var(--accent-green); }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Legend */
        .legend {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 0.75rem;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }
        
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .legend-dot.high { background: var(--accent-red); }
        .legend-dot.medium { background: var(--accent-orange); }
        .legend-dot.low { background: var(--accent-blue); }
        
        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 0.75rem;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .stats-bar span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            h1 { font-size: 1rem; }
            .heatmap { height: 50vh; }
            .onboarding h2 { font-size: 1.5rem; }
            .interest-grid { grid-template-columns: 1fr; }
            .country-popup { min-width: 180px; max-width: 250px; }
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/app.js"></script>
</body>
</html>
